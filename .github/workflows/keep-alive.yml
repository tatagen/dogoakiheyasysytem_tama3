name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 20-23 * * *'
    - cron: '*/10 0-12 * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Render server
        run: |
          HOUR=$(TZ='Asia/Tokyo' date +%H)
          MIN=$(TZ='Asia/Tokyo' date +%M)
          TIME=$((10#$HOUR * 60 + 10#$MIN))
          if [ $TIME -ge 330 ] && [ $TIME -le 1320 ]; then
            echo "Active hours - pinging server"
            curl -s -o /dev/null -w "%{http_code}" "${{ secrets.RENDER_URL }}/"
          else
            echo "Outside active hours - skipping"
          fi
